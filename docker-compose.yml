version: '3.8'

services:
  build-practical1-basic:
    build: .
    volumes:
      - ./practical1/basic:/workspace
    working_dir: /workspace
    command: gradle assembleDebug
    environment:
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - GRADLE_USER_HOME=/workspace/.gradle-home

  build-practical1-advanced:
    build: .
    volumes:
      - ./practical1/advanced:/workspace
    working_dir: /workspace
    command: gradle assembleDebug
    environment:
